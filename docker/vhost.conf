<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Garante que app/, config/, routes/, storage/ NAO sejam servidos,
    # mesmo estando dentro do projeto montado (docroot e /public).
    <Directory /var/www/html/app>
        Require all denied
    </Directory>
    <Directory /var/www/html/config>
        Require all denied
    </Directory>
    <Directory /var/www/html/routes>
        Require all denied
    </Directory>
    <Directory /var/www/html/storage>
        Require all denied
    </Directory>
    <Directory /var/www/html/database>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
